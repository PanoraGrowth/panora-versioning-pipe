# Commit Hygiene — lint PR commit messages for workflow-skip substrings
#
# Rejects PRs whose commit messages, title, or body contain any of the
# GitHub Actions workflow-skip substrings. Without this gate, a PR body
# that mentions the directive as descriptive prose silently skips every
# workflow on merge (see Finding #16 and PR #34).
#
# Allowed:
#   - Pipe-authored `chore(release):` / `chore(hotfix):` commits
#   - Commits carrying the `X-Intentional-Skip-CI: true` trailer
#
# See: CONTRIBUTING.md "Commit Message Hygiene" and scripts/lint/check-commit-hygiene.sh

name: Commit Hygiene

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  commit-hygiene:
    name: Lint commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run commit hygiene lint
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/lint/check-commit-hygiene.sh -p ${{ github.event.pull_request.number }}
