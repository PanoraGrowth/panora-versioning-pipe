name: Go CI

on:
  pull_request:
    paths:
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "Dockerfile"
      - ".golangci.yml"
      - ".goreleaser.yaml"
      - ".github/workflows/go-ci.yml"
      - "tests/integration/test_go_bootstrap.py"
  push:
    branches:
      - "go/**"

permissions:
  contents: read

concurrency:
  group: go-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Build, lint, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4

      - name: go test
        run: go test ./... -race -count=1

      - name: Docker build (sanity check)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: panora-versioning-pipe:ci
