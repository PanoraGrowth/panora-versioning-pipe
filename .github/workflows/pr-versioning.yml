# PR Versioning — validate commits and generate CHANGELOG
# The pipe versions itself using its own published Docker image

name: PR - Versioning

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  versioning:
    name: Validate & Generate CHANGELOG
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch target branch
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

      - name: Run versioning pipe
        uses: docker://public.ecr.aws/k5n8p2t3/panora-versioning-pipe:latest
        env:
          VERSIONING_PR_ID: ${{ github.event.pull_request.number }}
          VERSIONING_BRANCH: ${{ github.head_ref }}
          VERSIONING_TARGET_BRANCH: ${{ github.base_ref }}
          VERSIONING_COMMIT: ${{ github.event.pull_request.head.sha }}
          GIT_USER_NAME: "github-actions[bot]"
          GIT_USER_EMAIL: "github-actions[bot]@users.noreply.github.com"
