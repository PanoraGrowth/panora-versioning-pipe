# PR Versioning — validate commits and generate CHANGELOG
#
# Image tag controlled by org-level variable VERSIONING_PIPE_TAG.
# The pipe versions itself using its own published image.
# The entrypoint /pipe/pipe.sh is a stable public contract covered by semver.

name: PR - Versioning

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  versioning:
    name: Versioning Pipe
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/panoragrowth/panora-versioning-pipe:${{ vars.VERSIONING_PIPE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Run versioning pipe
        run: /pipe/pipe.sh
