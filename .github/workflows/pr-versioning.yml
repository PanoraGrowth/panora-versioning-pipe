# PR Versioning — validate commits and generate CHANGELOG
#
# TODO: migrate to container.image + VERSIONING_PIPE_TAG once floating
# tags exist (after the first release with the new publish.yml).

name: PR - Versioning

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  versioning:
    name: Versioning Pipe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Run versioning pipe
        uses: docker://ghcr.io/panoragrowth/panora-versioning-pipe:latest
