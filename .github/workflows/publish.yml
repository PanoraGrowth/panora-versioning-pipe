name: Release

on:
  workflow_run:
    workflows: ["Main - Create Version Tag"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: panora-versioning-pipe

jobs:
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca  # v3.9.0

      - name: Read version from tag created by the pipe
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          # Derive floating tags: v0.6.3 → v0.6 → v0
          MINOR_SERIES="${VERSION%.*}"
          MAJOR_SERIES="${MINOR_SERIES%.*}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "OWNER_LC=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "MINOR_SERIES=$MINOR_SERIES" >> "$GITHUB_OUTPUT"
          echo "MAJOR_SERIES=$MAJOR_SERIES" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION (minor series: $MINOR_SERIES, major series: $MAJOR_SERIES, owner: $OWNER_LC)"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Amazon ECR Public
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: public.ecr.aws
          username: ${{ secrets.ECR_ACCESS_KEY_ID }}
          password: ${{ secrets.ECR_SECRET_ACCESS_KEY }}

      - name: Build and push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75  # v6.9.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.version.outputs.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ steps.version.outputs.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.MINOR_SERIES }}
            ghcr.io/${{ steps.version.outputs.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.MAJOR_SERIES }}
            public.ecr.aws/${{ secrets.ECR_PUBLIC_ALIAS }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            public.ecr.aws/${{ secrets.ECR_PUBLIC_ALIAS }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.MINOR_SERIES }}
            public.ecr.aws/${{ secrets.ECR_PUBLIC_ALIAS }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.MAJOR_SERIES }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
