name: Release Readiness Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Ensure base ref is available
        run: git fetch origin ${{ github.base_ref }} --depth=0 || git fetch origin ${{ github.base_ref }}

      - name: Run release readiness checks
        id: checks
        env:
          BASE_REF: origin/${{ github.base_ref }}
          IMAGE: ghcr.io/panoragrowth/panora-versioning-pipe:${{ vars.VERSIONING_PIPE_TAG }}
        run: |
          set +e
          docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            -v /tmp:/tmp \
            -e BASE_REF \
            --entrypoint /bin/sh \
            "$IMAGE" -c '
              /usr/local/bin/panora-versioning config-parse &&
              /usr/local/bin/panora-versioning check-release-readiness
            ' | tee /tmp/release-readiness.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          status='${{ job.status }}'
          {
            echo "### Release Readiness Gate — ${status}"
            echo
            echo '```'
            cat /tmp/release-readiness.log
            echo '```'
          } > /tmp/comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md

      - name: Enforce gate result
        if: steps.checks.outputs.exit_code != '0'
        run: |
          echo "release-readiness gate failed (exit=${{ steps.checks.outputs.exit_code }})"
          exit 1
