name: Unit Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'pipe.sh'
      - 'Dockerfile'
      - 'tests/**'
      - 'Makefile'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: make build

      - name: Run unit tests
        run: make test
