# .versioning.yml - panora-versioning-pipe self-versioning
# This tool versions itself using its own pipe

commits:
  format: "conventional"

tickets:
  required: false

version:
  tag_prefix_v: true
  components:
    period:
      enabled: true
      initial: 0
    major:
      enabled: true
      initial: 1
    minor:
      enabled: true
      initial: 0
    timestamp:
      enabled: false

changelog:
  title: "Changelog"
  commit_url: "https://github.com/PanoraGrowth/panora-versioning-pipe/commit"
  ticket_link_label: "View issue"

commit_types:
  - name: "docs"
    description: "Documentation"
    bump: "none"
    emoji: "📚"
    changelog_group: "Documentation"

branches:
  production: "main"
  tag_on: "main"

notifications:
  teams:
    enabled: false
