# .versioning.yml - panora-versioning-pipe self-versioning
# This tool versions itself using its own pipe

commits:
  format: "conventional"

tickets:
  required: false

version:
  tag_prefix_v: true
  components:
    epoch:
      enabled: true
      initial: 0
    major:
      enabled: true
      initial: 1
    patch:
      enabled: true
      initial: 0
    timestamp:
      enabled: false

changelog:
  title: "Changelog"
  use_emojis: true
  commit_url: "https://github.com/PanoraGrowth/panora-versioning-pipe/commit"
  ticket_link_label: "View issue"

# Override specific commit types without replacing the entire array
# These are patched on top of defaults.yml commit_types by name
commit_type_overrides:
  docs:
    bump: "none"

branches:
  production: "main"
  tag_on: "main"

notifications:
  teams:
    enabled: false
