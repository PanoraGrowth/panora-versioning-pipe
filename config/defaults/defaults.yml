# =============================================================================
# defaults.yml - Default values for versioning system (v1.4)
# =============================================================================
# This file contains ALL default values used by the versioning system.
# Projects can override any value in their .versioning.yml file.
# =============================================================================

# Commit format: "ticket" (AM-XXXX - type: msg) or "conventional" (type(scope): msg)
commits:
  format: "ticket"

tickets:
  prefixes: []
  required: false
  url: ""

validation:
  require_ticket_prefix: false
  require_commit_types: true    # scope driven by changelog.mode: "last_commit" validates only last, "full" validates all
  hotfix_title_required: "error"  # "error" (block merge) or "warn" (advisory only). Guards squash-merge hotfix detection.
  # Runtime guardrail: block tag emission when the next computed tag is lower than
  # the latest tag in the repo. Protects against silent version resets caused by
  # misconfigured `version.components.*.initial` or future calculation bugs.
  #
  # ESCAPE HATCH: set to `true` to degrade the guardrail from hard block (exit 1)
  # to advisory warning (exit 0 with `result=warned` log). Use ONLY for intentional
  # downgrades or to unblock a release when the guardrail itself has a bug.
  # See docs/troubleshooting.md section "tag-on-merge failed with 'Version
  # regression blocked'" for recovery steps and emergency override workflow.
  allow_version_regression: false
  ignore_patterns:
    - "^Merge"
    - "^Revert"
    - "^fixup!"
    - "^squash!"
    - "^chore\\(release\\)"
    - "^chore\\(hotfix\\)"

version:
  components:
    epoch:
      enabled: false
      initial: 0
    major:
      enabled: true
      initial: 0
    patch:
      enabled: true
      initial: 0
    # hotfix_counter: 4th component used by the hotfix flow (v0.6.3+).
    # When enabled (default), a hotfix commit bumps HOTFIX_COUNTER and the
    # rendered tag appends ".N" only when hotfix_counter > 0 (e.g. v0.5.9.1).
    # Tags where hotfix_counter=0 still render as v0.5.9, preserving backward
    # compatibility for consumers that never produce a hotfix. Set to false to
    # opt out of the hotfix flow — hotfix commits in opted-out consumers are
    # treated as a no-op (no tag created, INFO log explaining why).
    hotfix_counter:
      enabled: true
      initial: 0
    timestamp:
      enabled: false
      format: "%Y%m%d%H%M%S"
      timezone: "UTC"

  tag_prefix_v: false

  separators:
    version: "."
    timestamp: "."
    tag_append: ""

# commit_type_overrides — patch or extend commit_types without redefining the full array.
# Only specify the fields you want to change. Everything else stays as defined in commit-types.yml.
# Example:
# commit_type_overrides:
#   docs:
#     bump: "none"
#   infra:
#     bump: "patch"
#     emoji: "🔩"
#     changelog_group: "Infrastructure"

changelog:
  file: "CHANGELOG.md"
  title: "Changelog"
  mode: "last_commit"           # "last_commit" (only last commit) or "full" (all commits since last tag)
  use_emojis: false
  include_commit_link: true
  include_ticket_link: true
  include_author: true
  commit_url: ""
  ticket_link_label: "View ticket"  # Label for ticket links in changelogs

  # Per-folder changelogs (for monorepos with scoped commits)
  # Requires commits.format: "conventional"
  # Routing: exclusive — each entry goes to EITHER a subfolder OR root, never both
  per_folder:
    enabled: false
    folders: []                 # Folders that get their own CHANGELOG (e.g. ["backend", "frontend"])
    folder_pattern: ""          # Regex to filter subfolders (e.g. "^[0-9]{3}-" for numbered folders)
    scope_matching: "suffix"    # "suffix" (cluster-ecs -> 001-cluster-ecs) or "exact" (folder name = scope)
    scope_matching_depth: 2     # max depth for suffix scan via find -maxdepth (default: 2)
    fallback: "root"            # "root" (unmatched → root CHANGELOG) or "file_path" (check modified files)

hotfix:
  # Patterns that identify a commit/PR title as hotfix.
  # Each entry is a Go regular expression (regexp stdlib).
  # If you don't want to use regex, write the full string —
  # it matches when the subject contains it as a substring.
  # The subject matches if ANY of the patterns hits.
  #
  # The same matcher is used by PR title validation (bypass conventional commit
  # check) and by post-merge scenario detection (trigger the hotfix flow). Pure
  # git, no platform APIs — works on GitHub, Bitbucket, GitLab, or any host.
  # Backwards compatible: a single string value (e.g. keyword: "URGENT") is
  # auto-expanded to a one-element list at parse time.
  keyword:
    # Regex: "hotfix: foo"  or  "hotfix(scope): foo"
    - "^hotfix(\\(|:)"
    # Regex: "Hotfix/branch"  or  "hotfix/branch"  (PR titles auto-generated by GitHub)
    - "^[Hh]otfix/"
    # Literal: any subject that contains "URGENT-PATCH" (no regex, simple option)
    - "URGENT-PATCH"
  # Branch prefix used when matching the source branch in PR context (e.g.
  # source "hotfix/auth-fix" → hotfix scenario when branches.hotfix_targets
  # contains the PR target). Independent from `keyword`: regex on commit
  # subjects vs literal prefix on branch names — they answer different questions.
  branch_prefix: "hotfix/"

branches:
  tag_on: "development"
  hotfix_targets:
    - "main"
    - "pre-production"

version_file:
  enabled: false
  # Groups — each group defines which files to update and when.
  # Without trigger_paths, a group always updates.
  # With trigger_paths, only updates when changed files match the globs.
  # File type is inferred by extension: .yaml/.yml → yq key replace,
  # .json → yq json, other → requires pattern (placeholder in file).
  # Example:
  # groups:
  #   - name: "root"
  #     files:
  #       - path: "version.yaml"
  #   - name: "api"
  #     trigger_paths: ["api/**"]
  #     files:
  #       - path: "api/version.yaml"
  #       - path: "api/src/version.ts"
  #         pattern: "__VERSION__"
  groups: []

notifications:
  teams:
    enabled: true
    on_success: false
    on_failure: true
    # payload_template auto-detected based on environment (Docker vs local)
