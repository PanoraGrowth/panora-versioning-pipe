# examples/bitbucket-pipelines.yml
#
# Complete Bitbucket Pipelines example for panora-versioning-pipe.
# Shows:
#   - PR pipeline step: validates commits, calculates version, updates CHANGELOG
#   - Branch pipeline step: creates and pushes the version tag
#   - Optional Teams webhook notification (secured variable)
#
# The versioning step uses the ECR Public image as its runner.
# No additional installation required — everything runs inside the container.
#
# Prerequisites:
#   - A .versioning.yml file in your repository root (see examples/ for options)
#   - SSH key configured in Bitbucket with write access to push tags and changelog commits
#   - (Optional) TEAMS_WEBHOOK_URL repository variable for failure notifications
#
# Variable mapping: Bitbucket's native vars are mapped to the pipe's generic VERSIONING_* vars.

image: node:20  # Your project's base image — versioning steps override this per-step

pipelines:
  pull-requests:
    '**':
      - step:
          name: Versioning (PR)
          image: public.ecr.aws/panoragrowth/versioning-pipe:latest
          variables:
            VERSIONING_PR_ID: $BITBUCKET_PR_ID
            VERSIONING_BRANCH: $BITBUCKET_BRANCH
            VERSIONING_TARGET_BRANCH: $BITBUCKET_PR_DESTINATION_BRANCH
            VERSIONING_COMMIT: $BITBUCKET_COMMIT
          script:
            - /pipe/pipe.sh

  branches:
    development:
      - step:
          name: Versioning (Tag)
          image: public.ecr.aws/panoragrowth/versioning-pipe:latest
          variables:
            VERSIONING_BRANCH: $BITBUCKET_BRANCH
            VERSIONING_COMMIT: $BITBUCKET_COMMIT
          script:
            - /pipe/pipe.sh

    # Optional: report build status to Bitbucket after any pipeline completes.
    # This enables branch restrictions (require green CI before merge).
    # Requires BITBUCKET_API_TOKEN as a secured repository variable.
    #
    # To use, add as a final step in any pipeline:
    #
    # after-script:
    #   - image: public.ecr.aws/panoragrowth/versioning-pipe:latest
    #     script:
    #       - /pipe/scripts/reporting/adapters/bitbucket-build-status.sh

definitions:
  # Secured variables to set in your Bitbucket repository settings:
  # TEAMS_WEBHOOK_URL  — Microsoft Teams incoming webhook URL (optional)
  # BITBUCKET_API_TOKEN — Bitbucket app password for build status reporting (optional)
