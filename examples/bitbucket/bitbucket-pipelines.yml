# Bitbucket Pipelines example for panora-versioning-pipe
# Copy this to your repository root as bitbucket-pipelines.yml
#
# Prerequisites:
#   - .versioning.yml in your repository root (optional — defaults apply without it)
#   - SSH key with write access (for pushing changelog commits and tags)
#   - (Optional) TEAMS_WEBHOOK_URL secured variable for failure notifications
#
# Platform variables (BITBUCKET_BRANCH, BITBUCKET_PR_ID, etc.) are
# auto-detected — no manual mapping needed.
#
# Image tag: pin to a version tag instead of :latest. Options:
#   :v0     — tracks all 0.x releases (recommended for most teams)
#   :v0.9   — tracks 0.9.x patches only
#   :v0.9.1 — fully pinned, never changes
# Bitbucket does not support org-level variables, so set
# VERSIONING_PIPE_TAG as a workspace variable or hardcode the tag.

definitions:
  steps:
    - step: &pr-versioning
        name: Versioning (PR)
        image: public.ecr.aws/k5n8p2t3/panora-versioning-pipe:v0
        script:
          - /pipe/pipe.sh

    - step: &branch-versioning
        name: Versioning (Tag)
        image: public.ecr.aws/k5n8p2t3/panora-versioning-pipe:v0
        script:
          - /pipe/pipe.sh

pipelines:
  pull-requests:
    '**':
      - step: *pr-versioning

  branches:
    development:        # Change to your tag branch (must match .versioning.yml branches.tag_on)
      - step: *branch-versioning

options:
  max-time: 10
