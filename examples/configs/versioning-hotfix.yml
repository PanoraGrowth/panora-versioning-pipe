# Example: hotfix-enabled versioning (v0.6.3+)
#
# Demonstrates the pipe's hotfix flow. As of v0.6.3, the hotfix feature is
# ON BY DEFAULT — consumers get patch bump on hotfix commits out of the box.
# This example shows the full explicit configuration so you can see every
# knob, but most of it matches the defaults.
#
# ----------------------------------------------------------------------
# How the hotfix flow works
# ----------------------------------------------------------------------
#
# 1. Create a branch from production (by convention, prefix it "hotfix/"):
#      git checkout -b hotfix/fix-auth-bypass main
#
# 2. Commit the fix (the message MUST start with the hotfix keyword):
#      git commit -m "hotfix: patch critical auth bypass"
#
# 3. Open a PR against main. For GitHub/Bitbucket squash merges, ensure the
#    PR title also starts with "hotfix:" so the squash commit subject carries
#    the signal. For traditional "Merge commit" style merges, the branch-tip
#    commit subject is inspected automatically (the pipe checks the merge
#    commit's second parent).
#
# 4. Merge. The pipe runs via tag-on-merge.yml and:
#    - Detects the `hotfix:` signal in the merge commit subject (or parent)
#    - Bumps the PATCH component (e.g. v1.2.3 → v1.2.3.1)
#    - Generates a CHANGELOG entry with the "(Hotfix)" marker in the header
#    - Creates and pushes the new tag atomically with the CHANGELOG commit
#
# ----------------------------------------------------------------------
# Detection is platform-agnostic — pure git, no APIs
# ----------------------------------------------------------------------
#
# The pipe detects hotfix via `git log -1 --format='%s' HEAD` and, for merge
# commits, also checks the second parent's subject. No GitHub API, no
# Bitbucket API, no `gh` CLI — works identically on GitHub Actions,
# Bitbucket Pipelines, GitLab CI, or any git host.
#
# ----------------------------------------------------------------------
# Tag semantics with the PATCH component
# ----------------------------------------------------------------------
#
# - v1.2.3    - last minor release (patch = 0, component hidden)
# - v1.2.3.1  - first hotfix on top of v1.2.3
# - v1.2.3.2  - second hotfix on top of v1.2.3
# - v1.3.0    - next minor release (patch resets to 0, hidden again)
# - v2.0.0    - next major release (minor and patch reset to 0)
#
# Rollback is trivial because every hotfix has its own immutable tag.
# Docker images published per release follow the same naming, so
# "docker pull ghcr.io/.../pipe:v1.2.3" restores the pre-hotfix state.
#
# ----------------------------------------------------------------------
# Opting out of hotfix
# ----------------------------------------------------------------------
#
# To disable the hotfix flow entirely, set version.components.patch.enabled
# to false. Hotfix commits will then be treated as a no-op: the pipe detects
# the signal, logs an INFO message explaining it is skipping, and creates no
# tag. The opt-out is deliberate — the consumer is telling the pipe "I don't
# want the 4th version component in my scheme, so a hotfix has no place to go".
#
# ======================================================================

commits:
  format: "conventional"

version:
  tag_prefix_v: true
  components:
    period:
      enabled: true
      initial: 0
    major:
      enabled: true
      initial: 1
    minor:
      enabled: true
      initial: 0
    # patch.enabled defaults to true as of v0.6.3 — shown explicitly here
    # for clarity. Set to false to opt out of the hotfix flow entirely.
    patch:
      enabled: true
      initial: 0
    timestamp:
      enabled: false

# Hotfix detection keywords. Each entry is a shell glob pattern matched
# against the merge commit subject. If ANY pattern matches, it's a hotfix.
# Default patterns cover:
#   - "hotfix:*"      → conventional commit (hotfix: fix auth)
#   - "hotfix(*"       → conventional with scope (hotfix(auth): fix)
#   - "[Hh]otfix/*"   → GitHub auto-title from branch name (Hotfix/fix-auth)
# Customize for your team's conventions. Backwards compatible: a single
# string value (e.g. keyword: "urgent") is auto-expanded at parse time.
hotfix:
  keyword:
    - "hotfix:*"
    - "hotfix(*"
    - "[Hh]otfix/*"

branches:
  production: "main"
  tag_on: "main"

changelog:
  file: "CHANGELOG.md"
  title: "Changelog"
  use_emojis: true
  include_commit_link: true
  include_author: true
  # Root changelog mode:
  #   "last_commit" (default) - only the last commit in the bump batch
  #                             appears in the CHANGELOG entry
  #   "full"                  - every commit since the last tag appears
  mode: "last_commit"

# ----------------------------------------------------------------------
# Consumer setup checklist (see docs/adoption-guide.md for details)
# ----------------------------------------------------------------------
#
# - Install a GitHub App on this repo with contents: read+write.
# - Store its app ID and private key as repo secrets CI_APP_ID
#   and CI_APP_PRIVATE_KEY.
# - Copy examples/github-actions/pr-versioning.yml and
#   examples/github-actions/tag-on-merge.yml into .github/workflows/.
# - Main branch protection must allow the GitHub App bypass to push
#   the atomic CHANGELOG + tag. Direct pushes by GITHUB_TOKEN would be
#   rejected even with --admin merges.
# - Commit conventional commits on feature branches; commit `hotfix:`
#   commits on hotfix/* branches to trigger the patch bump.
