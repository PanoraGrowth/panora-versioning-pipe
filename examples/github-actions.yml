# examples/github-actions.yml
#
# GitHub Actions workflow for panora-versioning-pipe.
# Shows:
#   - How to map GitHub Actions environment variables to the pipe's generic VERSIONING_* vars
#   - PR trigger for commit validation and changelog generation
#   - Branch trigger for tag creation
#
# The pipe is CI-platform agnostic. It reads VERSIONING_* variables for core context.
# Map your CI platform's native vars to these four before calling the pipe:
#
# Variable mapping:
#   VERSIONING_PR_ID          <- github.event.pull_request.number
#   VERSIONING_BRANCH         <- github.head_ref  (PR source branch)
#   VERSIONING_TARGET_BRANCH  <- github.base_ref  (PR target branch)
#   VERSIONING_COMMIT         <- github.sha
#
# Note: BITBUCKET_REPO_OWNER and BITBUCKET_REPO_SLUG are used by the optional
# Bitbucket build-status adapter only. They are not required for core versioning.

name: Versioning

on:
  pull_request:
    branches:
      - development
      - pre-production
      - main
  push:
    branches:
      - development

jobs:
  version-pr:
    name: Versioning (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: public.ecr.aws/panoragrowth/versioning-pipe:latest
    env:
      VERSIONING_PR_ID: ${{ github.event.pull_request.number }}
      VERSIONING_BRANCH: ${{ github.head_ref }}
      VERSIONING_TARGET_BRANCH: ${{ github.base_ref }}
      VERSIONING_COMMIT: ${{ github.sha }}
      # Optional: Teams notifications
      # TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run versioning pipe
        run: /pipe/pipe.sh

  version-tag:
    name: Versioning (Tag)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container:
      image: public.ecr.aws/panoragrowth/versioning-pipe:latest
    env:
      VERSIONING_BRANCH: ${{ github.ref_name }}
      VERSIONING_COMMIT: ${{ github.sha }}
      # Optional: Teams notifications
      # TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run versioning pipe
        run: /pipe/pipe.sh
