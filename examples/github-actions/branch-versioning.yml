# Tag on merge — create version tag when PR merges to target branch
# Copy this to .github/workflows/branch-versioning.yml

name: Create Version Tag

on:
  push:
    branches:
      - main            # Change to your tag branch (must match .versioning.yml branches.tag_on)
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'

permissions:
  contents: write

jobs:
  versioning:
    uses: ./.github/workflows/run-versioning.yml
    with:
      branch: main      # Must match the branch above
      commit: ${{ github.sha }}
