# Reusable versioning workflow
# Copy this to .github/workflows/run-versioning.yml
#
# Runs panora-versioning-pipe as a Docker action with the provided context.
# Called by pr-versioning.yml for the PR flow.
#
# NOTE: This reusable is PR-only. The tag-on-merge flow uses a single-job
# inline pattern (see tag-on-merge.yml) instead of calling this reusable,
# because GitHub Actions does not allow mixing `steps:` and `uses:` in a
# single job, and the token-generation + checkout + pipe-run sequence is
# clearer as linear steps than as a two-job (needs + outputs) chain.

name: Run Versioning Pipe

on:
  workflow_call:
    inputs:
      pr_id:
        description: "Pull request ID (empty for branch pipeline)"
        required: false
        type: string
        default: ""
      branch:
        description: "Current branch name"
        required: true
        type: string
      target_branch:
        description: "PR target branch (required for PR pipeline)"
        required: false
        type: string
        default: ""
      commit:
        description: "Commit SHA"
        required: true
        type: string

jobs:
  versioning:
    name: Versioning Pipe
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}

      # Public consumer image — hosted on ECR Public for zero-auth access
      # from any downstream repository (no GHCR package-read permission
      # needed). The `k5n8p2t3` alias is AWS auto-generated and will
      # transition to `panoragrowth` once AWS approves the custom alias;
      # the image will be available at both paths during the transition.
      # In production, pin to a specific version tag (e.g. :v0.5.0) instead
      # of :latest to get reproducible builds.
      - name: Run versioning pipe
        uses: docker://public.ecr.aws/k5n8p2t3/panora-versioning-pipe:latest
        env:
          VERSIONING_PR_ID: ${{ inputs.pr_id }}
          VERSIONING_BRANCH: ${{ inputs.branch }}
          VERSIONING_TARGET_BRANCH: ${{ inputs.target_branch }}
          VERSIONING_COMMIT: ${{ inputs.commit }}
