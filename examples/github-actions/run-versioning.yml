# Reusable versioning workflow
# Copy this to .github/workflows/run-versioning.yml
#
# Runs panora-versioning-pipe as a Docker action with the provided context.
# Called by pr-versioning.yml and tag-on-merge.yml.

name: Run Versioning Pipe

on:
  workflow_call:
    inputs:
      pr_id:
        description: "Pull request ID (empty for branch pipeline)"
        required: false
        type: string
        default: ""
      branch:
        description: "Current branch name"
        required: true
        type: string
      target_branch:
        description: "PR target branch (required for PR pipeline)"
        required: false
        type: string
        default: ""
      commit:
        description: "Commit SHA"
        required: true
        type: string
      github_token:
        description: >-
          GitHub App token for branch pipeline (required for tag-on-merge to
          push to protected main). Leave empty for PR pipeline — the default
          GITHUB_TOKEN is sufficient for read-only PR operations.
        required: false
        type: string
        default: ""

jobs:
  versioning:
    name: Versioning Pipe
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}
          # Use the GitHub App token when provided (tag-on-merge flow), fall
          # back to GITHUB_TOKEN for the PR flow. The App token is needed so
          # the pipe can push the CHANGELOG commit + version tag to a
          # protected main branch.
          token: ${{ inputs.github_token != '' && inputs.github_token || secrets.GITHUB_TOKEN }}

      # Public consumer image — hosted on ECR Public for zero-auth access
      # from any downstream repository (no GHCR package-read permission
      # needed). The `k5n8p2t3` alias is AWS auto-generated and will
      # transition to `panoragrowth` once AWS approves the custom alias;
      # the image will be available at both paths during the transition.
      # In production, pin to a specific version tag (e.g. :v0.5.0) instead
      # of :latest to get reproducible builds.
      - name: Run versioning pipe
        uses: docker://public.ecr.aws/k5n8p2t3/panora-versioning-pipe:latest
        env:
          VERSIONING_PR_ID: ${{ inputs.pr_id }}
          VERSIONING_BRANCH: ${{ inputs.branch }}
          VERSIONING_TARGET_BRANCH: ${{ inputs.target_branch }}
          VERSIONING_COMMIT: ${{ inputs.commit }}
          # CI_GITHUB_TOKEN is read by the pipe only when non-empty; the PR
          # flow leaves it blank and the pipe falls back to its default
          # (validate-only) behavior.
          CI_GITHUB_TOKEN: ${{ inputs.github_token }}
