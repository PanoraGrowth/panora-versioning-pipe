# =============================================================================
# defaults.yml - Default values for versioning system (v1.4)
# =============================================================================
# This file contains ALL default values used by the versioning system.
# Projects can override any value in their .versioning.yml file.
# =============================================================================

# Commit format: "ticket" (AM-XXXX - type: msg) or "conventional" (type(scope): msg)
commits:
  format: "ticket"

tickets:
  prefixes: []
  required: false
  url: ""

validation:
  require_ticket_prefix: false
  require_commit_types: true    # scope driven by changelog.mode: "last_commit" validates only last, "full" validates all
  ignore_patterns:
    - "^Merge"
    - "^Revert"
    - "^fixup!"
    - "^squash!"
    - "^chore\\(release\\)"
    - "^chore\\(hotfix\\)"

version:
  components:
    epoch:
      enabled: false
      initial: 0
    major:
      enabled: true
      initial: 0
    patch:
      enabled: true
      initial: 0
    # hotfix_counter: 4th component used by the hotfix flow (v0.6.3+).
    # When enabled (default), a hotfix commit bumps HOTFIX_COUNTER and the
    # rendered tag appends ".N" only when hotfix_counter > 0 (e.g. v0.5.9.1).
    # Tags where hotfix_counter=0 still render as v0.5.9, preserving backward
    # compatibility for consumers that never produce a hotfix. Set to false to
    # opt out of the hotfix flow — hotfix commits in opted-out consumers are
    # treated as a no-op (no tag created, INFO log explaining why).
    hotfix_counter:
      enabled: true
      initial: 0
    timestamp:
      enabled: false
      format: "%Y%m%d%H%M%S"
      timezone: "UTC"

  tag_prefix_v: false

  separators:
    version: "."
    timestamp: "."
    tag_append: ""

# commit_type_overrides — patch or extend commit_types without redefining the full array.
# Only specify the fields you want to change. Everything else stays as defined in commit-types.yml.
# Example:
# commit_type_overrides:
#   docs:
#     bump: "none"
#   infra:
#     bump: "patch"
#     emoji: "🔩"
#     changelog_group: "Infrastructure"

changelog:
  file: "CHANGELOG.md"
  title: "Changelog"
  mode: "last_commit"           # "last_commit" (only last commit) or "full" (all commits since last tag)
  use_emojis: false
  include_commit_link: true
  include_ticket_link: true
  include_author: true
  commit_url: ""
  ticket_link_label: "View ticket"  # Label for ticket links in changelogs

  # Per-folder changelogs (for monorepos with scoped commits)
  # Requires commits.format: "conventional"
  # Routing: exclusive — each entry goes to EITHER a subfolder OR root, never both
  per_folder:
    enabled: false
    folders: []                 # Folders that get their own CHANGELOG (e.g. ["backend", "frontend"])
    folder_pattern: ""          # Regex to filter subfolders (e.g. "^[0-9]{3}-" for numbered folders)
    scope_matching: "suffix"    # "suffix" (cluster-ecs -> 001-cluster-ecs) or "exact" (folder name = scope)
    fallback: "root"            # "root" (unmatched → root CHANGELOG) or "file_path" (check modified files)

hotfix:
  # Glob patterns that identify a hotfix commit. The pipe detects a hotfix
  # scenario when the merge commit subject (or, for merge-commit style merges,
  # the second parent's subject) matches ANY pattern in this list.
  # Each entry is a shell glob evaluated via `case` (supports *, ?, [...]).
  # Customize for your team's conventions. Detection is pure git — no platform
  # APIs, works on GitHub, Bitbucket, GitLab, or any git host.
  # Backwards compatible: a single string value (e.g. keyword: "hotfix") is
  # auto-expanded to ["hotfix:*", "hotfix(*"] at parse time.
  keyword:
    - "hotfix:*"
    - "hotfix(*"
    - "[Hh]otfix/*"

branches:
  development: "development"
  pre_production: "pre-production"
  production: "main"

version_file:
  enabled: false
  # Groups — each group defines which files to update and when.
  # Without trigger_paths, a group always updates.
  # With trigger_paths, only updates when changed files match the globs.
  # File type is inferred by extension: .yaml/.yml → yq key replace,
  # .json → yq json, other → requires pattern (placeholder in file).
  # Example:
  # groups:
  #   - name: "root"
  #     files:
  #       - path: "version.yaml"
  #   - name: "api"
  #     trigger_paths: ["api/**"]
  #     files:
  #       - path: "api/version.yaml"
  #       - path: "api/src/version.ts"
  #         pattern: "__VERSION__"
  groups: []

notifications:
  teams:
    enabled: true
    on_success: false
    on_failure: true
    # payload_template auto-detected based on environment (Docker vs local)
