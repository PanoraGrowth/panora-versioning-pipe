# =============================================================================
# defaults.yml - Default values for versioning system (v1.4)
# =============================================================================
# This file contains ALL default values used by the versioning system.
# Projects can override any value in their .versioning.yml file.
# =============================================================================

# Commit format: "ticket" (AM-XXXX - type: msg) or "conventional" (type(scope): msg)
commits:
  format: "ticket"

tickets:
  prefixes: []
  required: false
  url: ""

validation:
  require_ticket_prefix: false
  require_commit_types: true    # scope driven by changelog.mode: "last_commit" validates only last, "full" validates all
  ignore_patterns:
    - "^Merge"
    - "^Revert"
    - "^fixup!"
    - "^squash!"
    - "^chore\\(release\\)"
    - "^chore\\(hotfix\\)"

version:
  components:
    epoch:
      enabled: false
      initial: 0
    major:
      enabled: true
      initial: 0
    minor:
      enabled: true
      initial: 0
    # patch: 4th component used by the hotfix flow (v0.6.3+).
    # When enabled (default), a hotfix commit bumps PATCH and the rendered tag
    # appends ".N" only when patch > 0 (e.g. v0.5.9.1). Tags where patch=0 still
    # render as v0.5.9, preserving backward compatibility for consumers that
    # never produce a hotfix. Set to false to opt out of the hotfix flow —
    # hotfix commits in opted-out consumers are treated as a no-op (no tag
    # created, INFO log explaining why).
    patch:
      enabled: true
      initial: 0
    timestamp:
      enabled: true
      format: "%Y%m%d%H%M%S"
      timezone: "UTC"

  tag_prefix_v: false

  separators:
    version: "."
    timestamp: "."
    tag_append: ""

commit_types:
  - name: "breaking"
    description: "Breaking changes"
    bump: "major"
    emoji: "💥"
    changelog_group: "Breaking Changes"

  - name: "feat"
    description: "New feature"
    bump: "minor"
    emoji: "🚀"
    changelog_group: "Features"

  - name: "feature"
    description: "New feature (alias for feat)"
    bump: "minor"
    emoji: "🚀"
    changelog_group: "Features"

  - name: "fix"
    description: "Bug fix"
    bump: "patch"
    emoji: "🐛"
    changelog_group: "Bug Fixes"

  - name: "hotfix"
    description: "Urgent fix"
    bump: "patch"
    emoji: "🚑"
    changelog_group: "Hotfixes"

  - name: "security"
    description: "Security fix"
    bump: "patch"
    emoji: "🔒"
    changelog_group: "Security"

  - name: "revert"
    description: "Revert changes"
    bump: "patch"
    emoji: "⏪"
    changelog_group: "Reverts"

  - name: "perf"
    description: "Performance improvements"
    bump: "patch"
    emoji: "⚡"
    changelog_group: "Performance"

  - name: "refactor"
    description: "Code refactoring"
    bump: "none"
    emoji: "🔨"
    changelog_group: "Refactoring"

  - name: "docs"
    description: "Documentation"
    bump: "none"
    emoji: "📚"
    changelog_group: "Documentation"

  - name: "test"
    description: "Tests"
    bump: "none"
    emoji: "🧪"
    changelog_group: "Testing"

  - name: "chore"
    description: "Maintenance"
    bump: "none"
    emoji: "🔧"
    changelog_group: "Chores"

  - name: "build"
    description: "Build system"
    bump: "none"
    emoji: "🏗️"
    changelog_group: "Build"

  - name: "ci"
    description: "CI/CD"
    bump: "none"
    emoji: "⚙️"
    changelog_group: "CI/CD"

  - name: "style"
    description: "Code style"
    bump: "none"
    emoji: "🎨"
    changelog_group: "Style"

# commit_type_overrides — patch or extend commit_types without redefining the full array.
# Only specify the fields you want to change. Everything else stays as defined above.
# Example:
# commit_type_overrides:
#   docs:
#     bump: "none"
#   infra:
#     bump: "patch"
#     emoji: "🔩"
#     changelog_group: "Infrastructure"

changelog:
  file: "CHANGELOG.md"
  title: "Changelog"
  mode: "last_commit"           # "last_commit" (only last commit) or "full" (all commits since last tag)
  use_emojis: false
  include_commit_link: true
  include_ticket_link: true
  include_author: true
  commit_url: ""
  ticket_link_label: "View ticket"  # Label for ticket links in changelogs

  # Per-folder changelogs (for monorepos with scoped commits)
  # Requires commits.format: "conventional"
  # Routing: exclusive — each entry goes to EITHER a subfolder OR root, never both
  per_folder:
    enabled: false
    folders: []                 # Folders that get their own CHANGELOG (e.g. ["backend", "frontend"])
    folder_pattern: ""          # Regex to filter subfolders (e.g. "^[0-9]{3}-" for numbered folders)
    scope_matching: "suffix"    # "suffix" (cluster-ecs -> 001-cluster-ecs) or "exact" (folder name = scope)
    fallback: "root"            # "root" (unmatched → root CHANGELOG) or "file_path" (check modified files)

hotfix:
  # Glob patterns that identify a hotfix commit. The pipe detects a hotfix
  # scenario when the merge commit subject (or, for merge-commit style merges,
  # the second parent's subject) matches ANY pattern in this list.
  # Each entry is a shell glob evaluated via `case` (supports *, ?, [...]).
  # Customize for your team's conventions. Detection is pure git — no platform
  # APIs, works on GitHub, Bitbucket, GitLab, or any git host.
  # Backwards compatible: a single string value (e.g. keyword: "hotfix") is
  # auto-expanded to ["hotfix:*", "hotfix(*"] at parse time.
  keyword:
    - "hotfix:*"
    - "hotfix(*"
    - "[Hh]otfix/*"

branches:
  development: "development"
  pre_production: "pre-production"
  production: "main"
  tag_on: "development"      # Branch where tags are created (development | main)

version_file:
  enabled: false
  type: "yaml"              # yaml | json | regex
  file: "version.yaml"      # For yaml/json types
  key: "version"            # For yaml/json types
  files: []                 # For regex type: list of files to update (legacy, use groups for monorepos)
  pattern: ""               # For regex type: pattern to match
  replacement: ""           # For regex type: replacement (use {{VERSION}})

  # Groups for monorepo support (optional)
  # When groups are defined, only files in matched groups are updated
  # If no groups are defined, all files in 'files' array are updated (legacy behavior)
  groups: []
  # Example group structure:
  # groups:
  #   - name: "app-name"           # Identifier for logging
  #     trigger_paths:             # Glob patterns - if changed files match, this group is triggered
  #       - "projects/app/**"
  #     files:                     # Files to update when this group is triggered
  #       - "projects/app/src/environments/environment.dev.ts"
  #     update_all: false          # If true, when this group triggers, ALL groups are updated

  # Fallback behavior when a changed file doesn't match any trigger_paths
  # Options: "update_all" (safe default) | "update_none" | "error"
  unmatched_files_behavior: "update_all"

notifications:
  teams:
    enabled: true
    on_success: false
    on_failure: true
    # payload_template auto-detected based on environment (Docker vs local)
