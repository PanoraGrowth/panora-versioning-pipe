# All 4 version components enabled (epoch + major + patch + timestamp)
commits:
  format: "conventional"

version:
  components:
    epoch:
      enabled: true
      initial: 1
    major:
      enabled: true
      initial: 0
    patch:
      enabled: true
      initial: 0
    timestamp:
      enabled: true
      format: "%Y%m%d%H%M%S"
