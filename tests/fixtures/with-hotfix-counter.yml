# hotfix_counter component enabled — exercises the hotfix wire-up flow.
# epoch + major + patch + hotfix_counter, v prefix, no timestamp. Matches the tag
# shape of the pipe's own self-versioning (v0.5.9 → v0.5.9.1) so assertions
# are deterministic and mirror production use.
commits:
  format: "conventional"

version:
  tag_prefix_v: true
  components:
    epoch:
      enabled: true
      initial: 0
    major:
      enabled: true
      initial: 0
    patch:
      enabled: true
      initial: 0
    hotfix_counter:
      enabled: true
      initial: 0
    timestamp:
      enabled: false
