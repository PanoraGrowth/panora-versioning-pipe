# Epoch + major + patch + timestamp all enabled
commits:
  format: "conventional"

version:
  components:
    epoch:
      enabled: true
      initial: 0
    major:
      enabled: true
      initial: 0
    patch:
      enabled: true
      initial: 0
    timestamp:
      enabled: true
      format: "%Y%m%d%H%M%S"
      timezone: "UTC"
