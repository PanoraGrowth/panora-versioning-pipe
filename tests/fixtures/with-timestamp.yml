# All 4 version components enabled including timestamp
commits:
  format: "conventional"

version:
  components:
    period:
      enabled: true
      initial: 0
    major:
      enabled: true
      initial: 0
    minor:
      enabled: true
      initial: 0
    timestamp:
      enabled: true
      format: "%Y%m%d%H%M%S"
      timezone: "UTC"
